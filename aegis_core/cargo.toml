[package]
name    = "aegis-core"
version = "0.1.0"
edition = "2021"
authors = ["Phase-Null"]
description = "AEGIS — Adaptive Evolving Guardian and Intelligence System"

[[bin]]
name = "aegis"
path = "src/main.rs"

[dependencies]
# Async runtime — the backbone of all concurrent agent work
tokio = { version = "1", features = ["full"] }

# Serialization — how Rust and Python talk to each other
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

# Logging
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Crypto (Phase 6 — stubbed for now, imported so the dependency tree is set)
aes-gcm           = "0.10"
chacha20poly1305  = "0.10"
hkdf              = "0.12"
sha2              = "0.10"
rand              = "0.8"

# Fast read-write locks for SharedThreatContext
parking_lot = "0.12"

# Time
chrono = { version = "0.4", features = ["serde"] }

# UUID for message IDs
uuid = { version = "1", features = ["v4"] }
anyhow = "1"

[profile.release]
opt-level     = 3
lto           = true   # link-time optimisation — smaller, faster binary
codegen-units = 1
panic         = "abort" # no unwinding in release — reduces attack surface
