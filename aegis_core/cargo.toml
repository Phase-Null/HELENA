[package]
name    = "aegis-core"
version = "0.2.0"
edition = "2021"
authors = ["Phase-Null"]
description = "AEGIS — Adaptive Evolving Guardian and Intelligence System"

[[bin]]
name = "aegis"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization — IPC bridge
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"

# Logging
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Crypto — file integrity hashing
sha2 = "0.10"
hex  = "0.4"

# Fast RW locks for SharedThreatContext
parking_lot = "0.12"

# Time
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1", features = ["v4"] }

# Phase 1 — system monitoring (Windows + Linux + macOS)
# sysinfo: processes, CPU usage, process names/paths
sysinfo = "0.33"

# Phase 1 — network connections with PID on Windows
# uses GetExtendedTcpTable (iphlpapi) on Windows
# uses NETLINK_INET_DIAG on Linux
netstat2 = "0.9"

# Phase 6 crypto stubs (declared now so dependency tree is settled)
aes-gcm          = "0.10"
chacha20poly1305 = "0.10"
hkdf             = "0.12"
rand             = "0.8"

[profile.release]
opt-level     = 3
lto           = true
codegen-units = 1
panic         = "abort"
